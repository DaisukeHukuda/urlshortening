<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yamamotoya URL Shortening Tool</title>
    <link rel="icon" href="/assets/brandmark.svg" />
    <link rel="stylesheet" href="/tokens.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app dense">
      <header class="appbar">
        <a class="appbar__brand" href="/" aria-label="ホーム">
          <img class="appbar__mark" src="/assets/brandmark.svg" alt="" />
          <div class="appbar__name">Yamamotoya URL Shortening Tool</div>
        </a>
        <div class="appbar__spacer"></div>
        <div class="appbar__meta" id="appbar-host"></div>
        <div class="appbar__user" id="appbar-user" hidden><span class="appbar__username" id="appbar-username"></span><button class="iconbtn" type="button" data-act="logout">ログアウト</button></div>
      </header>

      <main class="page" id="page">
        <!-- ============ AUTH VIEW ============ -->
        <section id="view-auth" hidden>
          <div class="authwrap">
            <div class="card createform authcard">
              <h1 class="authcard__title" id="auth-title">ログイン</h1>
              <p class="authcard__sub" id="auth-sub">アカウントにログインしてください。</p>
              <form id="auth-form" novalidate>
                <div class="formgrid" style="grid-template-columns:1fr;gap:18px">
                  <div class="field">
                    <label class="label" for="auth-username">ユーザーID（メールアドレス可）<span class="req">必須</span></label>
                    <input class="input" id="auth-username" type="text" inputmode="email" autocomplete="username" placeholder="you@example.com" required />
                  </div>
                  <div class="field">
                    <label class="label" for="auth-password">パスワード<span class="req">必須</span></label>
                    <div class="input-affix">
                      <input class="input" id="auth-password" type="password" autocomplete="current-password" required />
                      <button type="button" class="affix-btn" data-act="toggle-password" id="auth-pw-toggle" aria-label="パスワードを表示"><span data-icon="eye"></span></button>
                    </div>
                    <span class="hint" id="auth-pw-hint" hidden>8文字以上</span>
                  </div>
                </div>
                <div class="form-error" id="auth-error" hidden><span data-icon="alert"></span><span class="form-error__msg"></span></div>
                <div class="form-actions" style="margin-top:24px"><button type="submit" class="btn btn--primary btn--block" id="auth-submit">ログイン</button></div>
              </form>
              <p class="authcard__toggle"><span id="auth-toggle-text">アカウントをお持ちでないですか？</span> <button type="button" class="linkbtn" data-act="auth-toggle" id="auth-toggle">新規登録</button></p>
            </div>
          </div>
        </section>

        <!-- ============ LIST VIEW ============ -->
        <section id="view-list">
          <div style="display: flex; flex-direction: column; gap: 20px">
            <form class="card createform createform--inline" id="create-form" novalidate>
              <div class="inlineform">
                <div class="field">
                  <label class="label" for="create-target">リンク先URL<span class="req">必須</span></label>
                  <input class="input" id="create-target" type="url" placeholder="https://example.com" required />
                </div>
                <div class="field">
                  <label class="label" for="create-title">タイトル<span class="opt">任意</span></label>
                  <input class="input" id="create-title" placeholder="例: セール" />
                  <span class="hint">一覧で見分けるための管理用メモ</span>
                </div>
                <div class="field">
                  <label class="label" for="create-code">カスタムコード<span class="opt">任意</span></label>
                  <input class="input" id="create-code" placeholder="例: sale" />
                  <span class="hint">短縮URLの末尾の文字列（未入力ならランダム生成）</span>
                </div>
                <div class="field">
                  <label class="label" for="create-expires">有効期限<span class="opt">任意</span></label>
                  <input class="input" id="create-expires" type="datetime-local" />
                </div>
                <div class="field field--btn">
                  <label class="label" aria-hidden="true">&nbsp;</label>
                  <button type="submit" class="btn btn--primary">作成</button>
                </div>
              </div>
              <div class="form-error" id="create-error" hidden>
                <span data-icon="alert"></span><span class="form-error__msg"></span>
              </div>
            </form>

            <div class="page__head" style="margin-top: 12px">
              <h1 class="page__title">リンク一覧</h1>
              <p class="page__sub" id="link-count"></p>
            </div>

            <div class="tablewrap table-only-pc" id="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>短縮URL</th>
                    <th>リンク先URL</th>
                    <th>状態</th>
                    <th class="num">クリック</th>
                    <th class="col-actions">操作</th>
                  </tr>
                </thead>
                <tbody id="links-tbody"></tbody>
              </table>
            </div>
            <div class="cardlist" id="links-cards"></div>

            <div class="empty" id="empty-state" hidden>
              <div class="empty__icon"><span data-icon="link"></span></div>
              <div class="empty__title">まだリンクがありません</div>
              <div class="empty__text">上の「作成」から最初の短縮URLを作成しましょう。</div>
            </div>
          </div>
        </section>

        <!-- ============ STATS VIEW ============ -->
        <section id="view-stats" hidden>
          <button class="backlink" type="button" data-act="back-list"><span data-icon="back"></span>一覧に戻る</button>
          <div class="page__head" style="margin-bottom: 8px">
            <div class="eyebrow">Analytics</div>
            <h1 class="page__title" style="margin-top: 6px">
              <span class="codemono" id="stats-code"></span> の分析
            </h1>
          </div>
          <div class="stat-hero">
            <span class="stat-hero__num" id="stats-total">0</span>
            <span class="stat-hero__label">総クリック数</span>
          </div>
          <div class="card card__pad" style="margin-bottom: 32px">
            <h3 class="section-label">日別クリック</h3>
            <div class="daychart" id="chart-byday"></div>
          </div>
          <div class="breakdowns">
            <div class="card card__pad"><h3 class="breakdown__title">国</h3><div id="bk-country"></div></div>
            <div class="card card__pad"><h3 class="breakdown__title">流入元</h3><div id="bk-referer"></div></div>
            <div class="card card__pad"><h3 class="breakdown__title">デバイス</h3><div id="bk-device"></div></div>
            <div class="card card__pad"><h3 class="breakdown__title">OS</h3><div id="bk-os"></div></div>
            <div class="card card__pad" style="grid-column: 1 / -1">
              <h3 class="breakdown__title">ブラウザ</h3><div id="bk-browser"></div>
            </div>
          </div>
        </section>

        <!-- ============ EDIT VIEW ============ -->
        <section id="view-edit" hidden>
          <button class="backlink" type="button" data-act="back-list"><span data-icon="back"></span>一覧に戻る</button>
          <div class="page__head" style="margin-bottom: 28px">
            <h1 class="page__title"><span class="codemono" id="edit-code-label"></span> を編集</h1>
          </div>
          <form class="card createform" id="edit-form" novalidate>
            <input type="hidden" id="edit-code" />
            <div class="formgrid" style="grid-template-columns: 1fr; gap: 24px">
              <div class="field">
                <label class="label" for="edit-target">リンク先URL<span class="req">必須</span></label>
                <input class="input" id="edit-target" type="url" required />
              </div>
              <div class="field">
                <label class="label" for="edit-title-input">タイトル<span class="opt">任意</span></label>
                <input class="input" id="edit-title-input" />
              </div>
              <div class="field">
                <label class="label" for="edit-expires">有効期限<span class="opt">空で無期限</span></label>
                <input class="input" id="edit-expires" type="datetime-local" />
              </div>
              <label class="field" style="flex-direction: row; align-items: center; gap: 12px; cursor: pointer">
                <input type="checkbox" id="edit-disabled" style="width: 18px; height: 18px; accent-color: #0071e3" />
                <span style="font-size: 15px; color: var(--fg-secondary)">このリンクを無効化する</span>
              </label>
            </div>
            <div class="form-error" id="edit-error" hidden>
              <span data-icon="alert"></span><span class="form-error__msg"></span>
            </div>
            <div class="form-actions" style="border-top: var(--hairline-light); margin-top: 28px; padding-top: 24px">
              <button type="submit" class="btn btn--primary">保存</button>
              <button type="button" class="btn btn--secondary" data-act="back-list">キャンセル</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <!-- ============ QR MODAL ============ -->
    <div class="modal-overlay" id="qr-modal" hidden>
      <div class="modal">
        <button class="modal__close" type="button" data-act="qr-close"><span data-icon="close"></span></button>
        <div class="modal__label">QR Code</div>
        <div class="modal__url" id="qr-url"></div>
        <div class="qrbox" id="qr-box"></div>
        <div class="modal__hint">スマートフォンのカメラで読み取れます</div>
      </div>
    </div>

    <script src="/vendor/qrcode.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
